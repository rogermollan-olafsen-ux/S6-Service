# Render blueprint — managed Postgres + auto-deploy from GitHub.
# Push to GitHub, then in Render: New → Blueprint → pick this repo.
# Render builds the Dockerfile, provisions Postgres, and redeploys on every
# push to the connected branch (autoDeploy: true).
#
# Point the mockup at the live API by opening:
#   https://<org>.github.io/<repo>/?api=https://visma-hq-api.onrender.com

databases:
  - name: visma-hq-db
    databaseName: visma_hq
    user: visma
    plan: free            # NOTE: free Postgres is deleted after 30 days — upgrade for anything lasting.

services:
  - type: web
    name: visma-hq-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeploy: true
    plan: free            # free web services sleep when idle and cold-start on the next request.
    envVars:
      # Render hands out a postgres:// URL; config.py upgrades it to asyncpg.
      - key: VISMA_HQ_DATABASE_URL
        fromDatabase:
          name: visma-hq-db
          property: connectionString
      # Set this in the Render dashboard to your real frontend origin,
      # e.g. ["https://visma.github.io"]. Left unset, the app allows all origins.
      - key: VISMA_HQ_CORS_ORIGINS
        sync: false
